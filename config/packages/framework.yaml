framework:
    secret: '%env(APP_SECRET)%'
    http_method_override: false
    handle_all_throwables: true

    php_errors:
        log: true

    session:
        enabled: false

    router:
        utf8: true

    serializer:
        enabled: true

    validation:
        email_validation_mode: html5

    property_info:
        enabled: true

    property_access:
        enabled: true

when@test:
    framework:
        test: true
