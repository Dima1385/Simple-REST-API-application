services:
  database:
    image: postgres:16-alpine
    container_name: book_library_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-book_library}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-book_library}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - book_library_net

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: book_library_php
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET:-d6f0e2c4a1b8d3e7f2a9b4c5d6e7f8a9}
      DATABASE_URL: "postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@database:5432/${POSTGRES_DB:-book_library}?serverVersion=16&charset=utf8"
      LOAD_FIXTURES: ${LOAD_FIXTURES:-1}
    volumes:
      - ./:/var/www/app:cached
    depends_on:
      database:
        condition: service_healthy
    networks:
      - book_library_net

  nginx:
    image: nginx:1.27-alpine
    container_name: book_library_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/app:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - book_library_net

networks:
  book_library_net:
    driver: bridge

volumes:
  db_data:
    driver: local
